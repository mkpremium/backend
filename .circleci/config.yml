# Javascript Node CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/language-javascript/ for more details
#
version: 2.1
jobs:
  test:
    docker:
      - image: circleci/node:8.11.1

    working_directory: ~/repo

    steps:
      - checkout
      - setup_remote_docker

      - run:
          name: Install dependencies
          command: npm install

      - run:
          name: Test
          command: MAX_ATTEMPTS=10 ./scripts/test-ci.sh

      - store_artifacts:
          path: ~/test-results/junit.xml
          prefix: test

      - store_test_results:
          path: junit.xml

workflows:
  version: 2
  build:
    jobs:
      - test
