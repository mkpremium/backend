# Javascript Node CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/language-javascript/ for more details
#
version: 2
jobs:
  test:
    docker:
      - image: circleci/node:9.2
    environment:
      - MOCHA_FILE: "$CIRCLE_TEST_REPORTS/test-results.xml"

    working_directory: ~/repo

    steps:
      - checkout

      - run:
          name: install dockerize
          command: sh docker/install-dockerize.sh

      - run:
          name: Couchbase
          command: sh docker/run-couchbase.sh

      - run:
          name: Wait for couchbase
          command: dockerize -wait tcp://localhost:8091 -timeout 1m

      # Download and cache dependencies
      - restore_cache:
          keys:
          - v1-dependencies-{{ checksum "package.json" }}
          # fallback to using the latest cache if no exact match is found
          - v1-dependencies-
      - run: npm install

      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "package.json" }}

      # run tests!
      - run: npm test -- --reporter mocha-circleci-reporter

  deploy:
    docker:
      - image: circleci/node:9.2
    environment:
      - NODE_ENV: "production"

    working_directory: ~/repo

    steps:
      - checkout

      # Download and cache dependencies
      - restore_cache:
          keys:
          - v1-dependencies-{{ checksum "package.json" }}
          # fallback to using the latest cache if no exact match is found
          - v1-dependencies-

      - run: npm install

      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "package.json" }}

      - add_ssh_keys

      - run: ssh-keyscan -H ec2-34-252-86-225.eu-west-1.compute.amazonaws.com >>  ~/.ssh/known_hosts

      - run: npm run build

      - run: npm run deploy -- ubuntu@ec2-34-252-86-225.eu-west-1.compute.amazonaws.com mkpremium

workflows:
  version: 2
  # testing is done on any branch that is not master
  testing:
    jobs:
      - test:
          filters:
            branches:
              ignore:
                - master
  # Deployment should happen just on master branch
  deploying:
    jobs:
      - deploy:
          filters:
            branches:
              only:
                - master
