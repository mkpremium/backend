on:
  push:
    branches:
      - main

name: Deploy to Amazon ECS

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    services:
      couchbase_db:
        image: "jvelasco/couchbase-dev"
        ports:
          - 8091:8091
          - 8092:8092
          - 8093:8093
          - 8094:8094
          - 11210:11210

    strategy:
      matrix:
        node-version: [12.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install & Lint
        run: |
          npm install
          npm run lint

      - name: Test
        uses: nick-invision/retry@v2
        with:
          max_attempts: 2
          retry_on: error
          timeout_minutes: 10
          retry_wait_seconds: 120
          command: ./scripts/test-ci.sh

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REPOSITORY: 173249668334.dkr.ecr.eu-west-1.amazonaws.com/backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build a docker container and
          # push it to ECR so that it can
          # be deployed to ECS.
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REPOSITORY:$IMAGE_TAG
          echo "::set-output name=image::$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Render Amazon ECS task definition for API V2 container
        id: api-v2-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infrastructure/ecs/api-v2-task-definition.json
          container-name: api
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS API V2 task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.api-v2-task-def.outputs.task-definition }}
          service: apiv2
          cluster: production
          wait-for-minutes: 5

      - name: Render Amazon ECS task definition for websocket container
        id: websocket-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infrastructure/ecs/websocket-task-definition.json
          container-name: websocket
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS WebSocket task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.websocket-task-def.outputs.task-definition }}
          service: websocket
          cluster: production
          wait-for-minutes: 5

      - name: Render Amazon ECS task definition for cronjobs container
        id: cronjobs-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infrastructure/ecs/cronjobs-task-definition.json
          container-name: cronjobs
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS cronjobs task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.cronjobs-task-def.outputs.task-definition }}
          cluster: production
          wait-for-minutes: 5

      - name: Render Amazon ECS task definition for API container
        id: api-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infrastructure/ecs/api-task-definition.json
          container-name: api
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS API task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.api-task-def.outputs.task-definition }}
          service: api
          cluster: production
          wait-for-minutes: 5
