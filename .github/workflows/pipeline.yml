on:
  push:
    branches:
      - main

name: Deploy to Amazon ECS

env:
  IMAGE_URL: 173249668334.dkr.ecr.eu-west-1.amazonaws.com/backend:${{ github.sha }}

jobs:

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 20.x ]

    services:
      postgresdb:
        image: "postgres:15.3"
        env:
          POSTGRES_USER: mkpremium_local_user
          POSTGRES_PASSWORD: mkpremium_local_password
          POSTGRES_DB: test_mkpremium
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use NodeJS ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install & Lint
        run: |
          npm install
          npm run lint


      - name: Test
        continue-on-error: true
        run: |
          echo $DATABASE_URL
          npm run test-ci

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        run: |
          # Build a docker container and
          # push it to ECR so that it can
          # be deployed to ECS.
          docker build -t $IMAGE_URL --build-arg app_version=$GITHUB_SHA .
          docker push $IMAGE_URL

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [ build, test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Render Amazon ECS task definition for API container
        id: api-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infrastructure/ecs/api-task-definition.json
          container-name: api
          image: ${{ env.IMAGE_URL }}

      - name: Deploy Amazon ECS API task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.api-task-def.outputs.task-definition }}
          service: api
          cluster: prod
          wait-for-minutes: 5

  deploy-events-worker:
    name: Deploy Events Worker
    runs-on: ubuntu-latest
    needs: [ build, test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Render Amazon ECS task definition for Events Worker container
        id: events-worker-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infrastructure/ecs/events-worker-task-definition.json
          container-name: events-worker
          image: ${{ env.IMAGE_URL }}

      - name: Deploy Amazon ECS Events Worker task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.events-worker-task-def.outputs.task-definition }}
          service: events-worker
          cluster: prod
          wait-for-minutes: 5

  deploy-migration-worker:
    name: Deploy Migration Worker
    runs-on: ubuntu-latest
    needs: [ build, test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Render Amazon ECS task definition for Migration Worker container
        id: migration-worker-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infrastructure/ecs/migration-worker-task-definition.json
          container-name: migration-worker
          image: ${{ env.IMAGE_URL }}

      - name: Deploy Amazon ECS Migration Worker task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.migration-worker-task-def.outputs.task-definition }}
          service: migration-worker
          cluster: prod
          wait-for-minutes: 5

  deploy-scheduled-tasks:
    name: Deploy scheduled tasks (freezer and proposals sender)
    runs-on: ubuntu-latest

    needs: [ build, test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install jq

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Render Amazon ECS task definition for proposals-sender container
        id: proposals-sender-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infrastructure/ecs/proposals-sender-task-definition.json
          container-name: proposals-sender
          image: ${{ env.IMAGE_URL }}

      - name: Deploy Amazon ECS proposals-sender task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.proposals-sender-task-def.outputs.task-definition }}
          cluster: prod
          wait-for-minutes: 5

      - name: Update proposals-sender schedule rule
        run: ./scripts/deploy-scheduled-task.sh proposals-sender proposal-sender-cronjob

      - name: Render Amazon ECS task definition for cronjobs container
        id: cronjobs-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infrastructure/ecs/cronjobs-task-definition.json
          container-name: cronjobs
          image: ${{ env.IMAGE_URL }}

      - name: Deploy Amazon ECS cronjobs task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.cronjobs-task-def.outputs.task-definition }}
          cluster: prod
          wait-for-minutes: 5

      - name: Update freezer cronjob schedule rule
        run: ./scripts/deploy-scheduled-task.sh cronjobs freezer-cronjob
