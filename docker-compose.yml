version: '2'

services:
  queue_ui:
    image: "koryonik/gearman-ui"
    ports:
      - "8085:80"
    depends_on:
      - gearman
    networks:
      - mkpremium
  gearman:
    image: "artefactual/gearmand"
    ports:
      - "4730:4730"
    networks:
      - mkpremium
  db:
    image: "rkmax/couchbase:bitdistrict-5.5.2"
    ports:
      - "8091-8094:8091-8094"
      - "9110:9110"
      - "11207:11207"
      - "11210:11210"
      - "11211:11211"
      - "18091:18091"
      - "18092:18092"
    networks:
      - mkpremium
    volumes:
      - /run/media/rkmax/Development/docker-volumen/mkpremium_db:/opt/couchbase/var
    mem_limit: 10g
    memswap_limit: 10g
    cpuset: 6-11
networks:
  mkpremium:
    external: false
