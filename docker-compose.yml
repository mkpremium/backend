version: '3'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mk-backend:local

    environment:
      APP_PORT: "9001"
      COUCHBASE_URI: "couchbase://couchbase_db"
      COUCHBASE_BUCKET: "mkpremium"
      COUCHBASE_USER: "couchbase-user"
      COUCHBASE_PASS: "couchbase-password"
      SOCKET_ENABLED: "false"
      SOCKET_SERVER: "http://websocket:9002"
      DEBUG: "ON"
    expose:
      - "9001"
    volumes:
      - ./docker/wait-for-it.sh:/tmp/wait-for-it.sh
    links:
      - "websocket"
      - "couchbase_db"
    depends_on:
      - websocket
      - couchbase_db
    entrypoint: ["/tmp/wait-for-it.sh", "couchbase_db:8091", "--", "/app/bin/www.js"]

  couchbase_db:
    image: "couchbase:community-6.0.0"

    ports:
      - "8091:8091" # REST/HTTP including Web UI
      - "8092:8092" # Views and XDCR access
      - "8093:8093" # Query service REST/HTTP traffic
      - "8094:8094" # Search service REST/HTTP traffic
      - "11210:11210" # Data Service

    ulimits:
      nofile: 40960
      core: 100000000
      memlock: 100000000

