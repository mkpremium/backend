version: '3'

services:
  www:
    build:
      context: .
      dockerfile: Dockerfile
    image: mk-backend:local

    environment:
      APP_PORT: "9003"
      COUCHBASE_URI: "couchbase://couchbase_db"
      COUCHBASE_BUCKET: "mkpremium"
      COUCHBASE_USER: "couchbase"
      COUCHBASE_PASS: "couchbase"
      SOCKET_ENABLED: "false"
      DEBUG: "app:*"
      MIGRATION_MODULE: "true"

    volumes:
      - ./docker/wait-for-it.sh:/tmp/wait-for-it.sh

    entrypoint: ["/tmp/wait-for-it.sh", "couchbase_db:8091", "--", "/app/build/bin/www.js"]
    ports:
      - "9003:9003"

  couchbase_db:
    build:
      context: ./docker/couchbase
      dockerfile: Dockerfile
    image: "mkpremium:couchbase-local"

    ports:
      - "8091:8091" # REST/HTTP including Web UI
      - "8092:8092" # Views and XDCR access
      - "8093:8093" # Query service REST/HTTP traffic
      - "8094:8094" # Search service REST/HTTP traffic
      - "11210:11210" # Data Service

    ulimits:
      nofile: 40960
      core: 100000000
      memlock: 100000000
