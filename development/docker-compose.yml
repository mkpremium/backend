version: '2'

services:
  couchbasedb:
    build: ./docker/couchbase
    container_name: bitdistrict-couchbase
    privileged: true
    environment:
      - COUCHBASE_ADMINISTRATOR_USERNAME=${COUCHBASE_ADMINISTRATOR_USERNAME}
      - COUCHBASE_ADMINISTRATOR_PASSWORD=${COUCHBASE_ADMINISTRATOR_PASSWORD}
      - COUCHBASE_BUCKET=${COUCHBASE_BUCKET}
      - COUCHBASE_BUCKET_PASSWORD=${COUCHBASE_BUCKET_PASSWORD}
    volumes:
      - ./docker/couchbase/data:/opt/couchbase/var/lib/couchbase/data
    ports:
     - 28091:8091
     - 28092:8092
     - 28093:8093
     - 28094:8094
  nodejs:
    build:
      context: .
      dockerfile: ./docker/nodejs/Dockerfile
    container_name: bitdistrict-nodejs
    command: /docker-setup.sh
    privileged: true
    environment:
      - NODE_ENV=development
    volumes:
      - .:/usr/src/app/
      - /usr/src/app/node_modules
    links:
      - couchbasedb
    depends_on:
      - couchbasedb
    ports:
      - 3000:3000
      - 56745:56745 #debug port
