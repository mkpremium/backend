upstream mkpremium_app {
  server 127.0.0.1:9001;
}

upstream mkpremium_socket {
  server 127.0.0.1:8081;
}

server {
    listen 80;
    listen [::]:80;

    server_name www.demomk.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name www.demomk.com;

    ssl_certificate /etc/nginx/certs/live/demomk.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/demomk.com/privkey.pem;

    client_max_body_size 1024M;

    location /socket.io {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_pass http://mkpremium_socket;
    }

    location ~ ^/(operators|buildings|owners|worksheets|docs|webhook|calls|history|scheduled-events|migration) {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_pass http://mkpremium_app;

    }

    location / {
      root /sites/mkpremium;
      index index.html;
      try_files $uri $uri/ /index.html =404;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name ws.demomk.com;

    ssl_certificate /etc/nginx/certs/live/demomk.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/demomk.com/privkey.pem;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_pass http://mkpremium_socket;
    }
}
